eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost

microservice:
     order-services:
        endpoints:
            endpoint:
               uri: "http://ORDER-SERVICE/order/orders"
               
     payment-services:
        endpoints:
            endpoint:
               uri: "http://PAYMENT-SERVICE/payment/payments"    
